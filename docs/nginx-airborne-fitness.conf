# Nginx reverse proxy for Airborne Fitness (Node app on port 5001)
# Copy to: /etc/nginx/sites-available/airborne-fitness (Debian/Ubuntu)
#          or /etc/nginx/conf.d/airborne-fitness.conf (RHEL/Amazon Linux)
#
# 1. Replace your-domain.com with your actual domain or server IP.
# 2. For HTTPS: uncomment the first server block and the ssl_* lines, then run certbot.

# Optional: redirect HTTP to HTTPS (enable after SSL is set up)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name your-domain.com;

    # If using HTTPS, switch to: listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
